<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Padaria Diniz</title>
    
    <link rel="stylesheet" href="CSS/funcionalidades.css">
    <link rel="stylesheet" href="CSS/pagina-cadastro.css">
</head>
<body>
    <main class="pagina-cadastro">
        <a href="padaria-landinpage.html" class="botao-fechar" aria-label="Voltar para a página inicial">&times;</a>

        <section id="logo-cadastro">
            <div class="conteudo-logo">
                <img class="logo" src="./Imagens/Logo.png" alt="Logo Padaria Diniz">
                <h1>MERCADINHO & PADARIA</h1>
                <h1 class="diniz">DINIZ</h1>
                <p>Junte-se à nossa família e aproveite o melhor do sabor artesanal.</p>
            </div>
        </section>

        <section class="conteiner-cadastro">
            <form class="form-cadastro">
                <h2>Criar Conta</h2>
                <h3>Preencha seus dados para agendar pedidos.</h3>

                <div class="grupo-inputs-linha">
                    <div class="cadastro-input">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="cadastro-input">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="cadastro-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="grupo-inputs-linha">
                    <div class="cadastro-input">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Mín. 8 caracteres" required>
                    </div>
                    <div class="cadastro-input">
                        <label for="confirmar-senha">Confirmar Senha</label>
                        <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Repita a senha" required>
                    </div>
                </div>
                
                <button class="botao-cadastro" type="submit">Finalizar Cadastro</button>

                <div class="divisor">
                    <span>ou</span>
                </div>

                <a href="padaria-login.html" class="fazer-login">Já tenho uma conta</a>
            </form>
        </section>
    </main>

    <div id="toast-container"></div>

    <script src="Script/funcionalidades.js"></script>
    <script src="Script/cadastro.js"></script>
</body>
</html>
